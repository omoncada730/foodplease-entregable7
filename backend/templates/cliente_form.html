{% extends 'base.html' %}
{% block title %}{{ accion }} Cliente{% endblock %}
{% block content %}
<div class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">{{ accion }} Cliente</h1>
        </div>
        <a href="{{ url_for('listar_clientes') }}" class="btn btn-outline btn-sm">← Volver</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Nombre completo *</label>
                    <input type="text" name="nombre" class="form-control" required
                           value="{{ cliente.nombre if cliente else '' }}" placeholder="Ej: Maria Lopez">
                </div>
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" required
                           value="{{ cliente.email if cliente else '' }}" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Telefono</label>
                    <input type="tel" name="telefono" class="form-control"
                           value="{{ cliente.telefono if cliente else '' }}" placeholder="+56912345678">
                </div>
                <div class="form-group">
                    <label class="form-label">Direccion</label>
                    <input type="text" name="direccion" class="form-control"
                           value="{{ cliente.direccion if cliente else '' }}" placeholder="Av. Providencia 1234, Santiago">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    {% if accion == 'Crear' %}✅ Crear Cliente{% else %}💾 Guardar Cambios{% endif %}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
